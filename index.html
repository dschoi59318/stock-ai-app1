<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 주식 분석</title>
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI주식">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'DM Mono', monospace;
    --sans: 'Pretendard', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 그리드 효과 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* 헤더 */
  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .logo-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #f1f5f9;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 300;
  }

  /* API 키 입력 */
  .api-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .api-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .api-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
  }

  .api-input::placeholder { color: var(--muted); }

  /* 탭 */
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 9px 12px;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    font-family: var(--sans);
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(59,130,246,0.3);
  }

  /* 패널 */
  .panel { display: none; }
  .panel.active { display: block; }

  /* 폼 요소 */
  .form-section { margin-bottom: 1.25rem; }

  .form-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    display: block;
  }

  /* 태그 선택 */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 100px;
    cursor: pointer;
    color: var(--muted);
    background: var(--surface);
    transition: all 0.15s;
    font-family: var(--sans);
  }

  .tag:hover { border-color: var(--accent); color: var(--text); }

  .tag.on {
    background: rgba(59,130,246,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* 그리드 select */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  select, input[type=text] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    font-family: var(--sans);
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  select:focus, input[type=text]:focus {
    border-color: var(--accent);
  }

  input[type=text]::placeholder { color: var(--muted); }

  /* 실행 버튼 */
  .run-btn {
    width: 100%;
    padding: 13px;
    margin-top: 4px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    letter-spacing: 0.01em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .run-btn:hover { background: #2563eb; box-shadow: 0 0 30px rgba(59,130,246,0.4); }
  .run-btn:active { transform: scale(0.99); }
  .run-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; box-shadow: none; }

  /* 결과 박스 */
  .result-wrap {
    margin-top: 1.5rem;
    display: none;
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .result-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--green);
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 0.1em;
  }

  .result-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    font-size: 14px;
    line-height: 1.85;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 60px;
  }

  .result-box.loading {
    color: var(--muted);
    font-style: italic;
    font-family: var(--mono);
    font-size: 13px;
  }

  .result-box.error {
    color: var(--red);
    border-color: rgba(239,68,68,0.3);
    background: rgba(239,68,68,0.05);
  }

  /* 액션 버튼 그룹 */
  .action-btns {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    margin-bottom: 6px;
  }

  .act-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }

  .act-btn:hover { border-color: var(--accent); color: var(--text); }

  .act-btn.copied {
    border-color: var(--green);
    color: var(--green);
    background: rgba(16,185,129,0.08);
  }

  .act-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* 종목 자동검색 드롭다운 */
  .stock-wrap { position: relative; }
  .stock-dropdown {
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: #111827;
    border: 1px solid #3b82f6;
    border-top: none;
    border-radius: 0 0 10px 10px;
    z-index: 100;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }
  .stock-dropdown.open { display: block; }
  .stock-item {
    padding: 10px 16px;
    cursor: pointer;
    border-bottom: 1px solid #1e2d45;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stock-item:last-child { border-bottom: none; }
  .stock-item:hover { background: #1a2235; }
  .stock-item-name { font-size: 14px; color: #e2e8f0; font-weight: 500; }
  .stock-item-code { font-size: 12px; color: #64748b; font-family: monospace; }
  .stock-item-market {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    background: rgba(59,130,246,0.15); color: #3b82f6;
    margin-left: auto;
  }
  .stock-selected {
    font-size: 11px; color: #10b981;
    margin-top: 4px; padding-left: 4px;
    display: none; font-family: monospace;
  }
  .searching-indicator {
    padding: 10px 16px; font-size: 13px;
    color: #64748b; font-style: italic;
  }

  /* 실시간 뉴스 섹션 */
  .news-section {
    margin-top: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: none;
  }
  .news-head {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .news-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.5;
  }
  .news-item:last-child { border-bottom: none; }
  .news-title { color: var(--text); margin-bottom: 2px; }
  .news-meta { font-size: 11px; color: var(--muted); }

  /* 데이터 소스 칩 */
  .source-chips {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 8px; display: none;
  }
  .src-chip {
    font-size: 10px; padding: 3px 8px; border-radius: 20px;
    border: 1px solid var(--border); color: var(--muted);
    font-family: var(--mono); transition: all 0.2s;
  }
  .src-chip.active { border-color: #378ADD; color: #378ADD; }
  .src-chip.done { border-color: var(--green); color: var(--green); }

  /* 면책 */
  .disclaimer {
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.6;
    padding: 10px 14px;
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.15);
    border-radius: 8px;
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <div class="logo-dot"></div>
      <span class="logo-tag">AI Stock Analyzer</span>
    </div>
    <h1>AI 주식 분석</h1>
    <p class="subtitle">Claude AI가 투자 성향에 맞는 종목을 추천하고 매수/매도 판단을 도와줍니다</p>
  </header>

  <!-- API 키 불필요 - Worker에서 처리 -->

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('recommend')">조건 입력 → 종목 추천</button>
    <button class="tab" onclick="switchTab('analyze')">종목 입력 → 매수/매도 판단</button>
  </div>

  <!-- 탭 1: 종목 추천 -->
  <div class="panel active" id="panel-recommend">

    <div class="form-section">
      <label class="form-label">투자 성향</label>
      <div class="tags" id="style-tags">
        <button class="tag on" onclick="solo(this,'style-tags')">안정형</button>
        <button class="tag" onclick="solo(this,'style-tags')">성장형</button>
        <button class="tag" onclick="solo(this,'style-tags')">배당형</button>
        <button class="tag" onclick="solo(this,'style-tags')">공격형</button>
      </div>
    </div>

    <div class="form-section">
      <label class="form-label">선호 섹터 (복수 선택)</label>
      <div class="tags" id="sector-tags">
        <button class="tag" onclick="multi(this)">반도체</button>
        <button class="tag" onclick="multi(this)">바이오</button>
        <button class="tag" onclick="multi(this)">2차전지</button>
        <button class="tag" onclick="multi(this)">IT/플랫폼</button>
        <button class="tag" onclick="multi(this)">금융</button>
        <button class="tag" onclick="multi(this)">에너지</button>
        <button class="tag" onclick="multi(this)">소비재</button>
        <button class="tag on" onclick="multi(this)">제한 없음</button>
      </div>
    </div>

    <div class="form-section grid2">
      <div>
        <label class="form-label">투자 기간</label>
        <select id="r-period">
          <option>단기 (1개월 이내)</option>
          <option>중기 (3~6개월)</option>
          <option selected>장기 (1년 이상)</option>
        </select>
      </div>
      <div>
        <label class="form-label">투자 시장</label>
        <select id="r-market">
          <option selected>국내 (코스피/코스닥)</option>
          <option>미국 (나스닥/NYSE)</option>
          <option>국내+미국 혼합</option>
        </select>
      </div>
    </div>

    <div class="form-section">
      <label class="form-label">추가 조건 (선택)</label>
      <input type="text" id="r-extra" placeholder="예: 배당 3% 이상, 시총 1조 이상, PER 15 이하">
    </div>

    <button class="run-btn" id="btn-r" onclick="runRecommend()">AI 종목 추천 받기</button>

    <div class="result-wrap" id="wrap-r">
      <div class="result-header">
        <span class="result-tag">ANALYSIS COMPLETE</span>
      </div>
      <div class="result-box" id="box-r"></div>
      <div class="action-btns">
        <button class="act-btn" id="copy-r" onclick="copyResult('r')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          결과 복사
        </button>
        <button class="act-btn" onclick="savePDF('r', '종목추천')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          PDF 저장
        </button>
      </div>
      <p class="disclaimer">⚠️ 본 분석은 AI가 생성한 정보이며 투자 권유가 아닙니다. 최종 투자 결정은 본인 책임입니다.</p>
    </div>
  </div>

  <!-- 탭 2: 매수/매도 판단 -->
  <div class="panel" id="panel-analyze">

    <div class="form-section">
      <label class="form-label">종목명 검색</label>
      <div class="stock-wrap">
        <input type="text" id="a-stock" placeholder="종목명 입력 (예: 삼성전자, OCI, SK하이닉스...)" autocomplete="off" oninput="searchStock(this.value)">
        <div class="stock-dropdown" id="stock-dropdown"></div>
      </div>
      <div class="stock-selected" id="stock-selected">✅ <span id="selected-info"></span></div>
      <input type="hidden" id="a-stock-code" value="">
      <input type="hidden" id="a-stock-market" value="">
    </div>

    <div class="form-section">
      <label class="form-label">분석 관점</label>
      <div class="tags" id="view-tags">
        <button class="tag on" onclick="solo(this,'view-tags')">종합 분석</button>
        <button class="tag" onclick="solo(this,'view-tags')">기본적 분석</button>
        <button class="tag" onclick="solo(this,'view-tags')">기술적 분석</button>
        <button class="tag" onclick="solo(this,'view-tags')">리스크 분석</button>
      </div>
    </div>

    <div class="form-section grid2">
      <div>
        <label class="form-label">보유 여부</label>
        <select id="a-hold">
          <option>미보유 (신규 매수 검토)</option>
          <option>보유 중 (추가 매수 검토)</option>
          <option>보유 중 (매도 검토)</option>
        </select>
      </div>
      <div>
        <label class="form-label">투자 기간</label>
        <select id="a-period">
          <option>단기</option>
          <option selected>중기</option>
          <option>장기</option>
        </select>
      </div>
    </div>

    <button class="run-btn" id="btn-a" onclick="runAnalyze()">AI 매수/매도 판단 받기</button>

    <div class="result-wrap" id="wrap-a">
      <div class="result-header">
        <span class="result-tag">ANALYSIS COMPLETE</span>
      </div>
      <div class="source-chips" id="source-chips-a">
        <span class="src-chip" id="chip-news-a">📰 Naver 뉴스</span>
        <span class="src-chip" id="chip-web-a">📊 실시간 주가</span>
        <span class="src-chip" id="chip-ai-a">🤖 Claude AI</span>
      </div>
      <div class="news-section" id="news-a">
        <div class="news-head">📰 실시간 관련 뉴스</div>
        <div id="news-list-a"></div>
      </div>
      <div class="result-box" id="box-a"></div>
      <div class="action-btns">
        <button class="act-btn" id="copy-a" onclick="copyResult('a')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          결과 복사
        </button>
        <button class="act-btn" onclick="savePDF('a', '매수매도판단')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          PDF 저장
        </button>
      </div>
      <p class="disclaimer">⚠️ 본 분석은 AI가 생성한 정보이며 투자 권유가 아닙니다. 최종 투자 결정은 본인 책임입니다.</p>
    </div>
  </div>

</div>

<script>
  // API 키 저장/불러오기
  // 종목 자동검색
  let searchTimer = null;
  let selectedStock = null;

  async function searchStock(query) {
    const dropdown = document.getElementById('stock-dropdown');
    const selectedDiv = document.getElementById('stock-selected');

    // 선택 초기화
    document.getElementById('a-stock-code').value = '';
    selectedDiv.style.display = 'none';
    selectedStock = null;

    if (!query || query.length < 1) {
      dropdown.classList.remove('open');
      return;
    }

    // 숫자 6자리면 코드 직접 입력
    if (/^\d{6}$/.test(query)) {
      dropdown.innerHTML = `<div class="stock-item" onclick="selectStock('${query}', '${query}', '직접입력')">
        <span class="stock-item-name">${query}</span>
        <span class="stock-item-code">${query}</span>
        <span class="stock-item-market">직접입력</span>
      </div>`;
      dropdown.classList.add('open');
      return;
    }

    // 디바운스 300ms
    clearTimeout(searchTimer);
    searchTimer = setTimeout(async () => {
      dropdown.innerHTML = '<div class="searching-indicator">🔍 검색 중...</div>';
      dropdown.classList.add('open');

      try {
        // Worker GET 엔드포인트로 종목 검색 (CORS 우회)
        const res = await fetch(
          `${WORKER_URL}?search=${encodeURIComponent(query)}`
        );
        const listed = await res.json();

        if (!listed || listed.length === 0) {
          dropdown.innerHTML = '<div class="searching-indicator">검색 결과 없음 — 다른 이름으로 시도해보세요</div>';
          return;
        }

        dropdown.innerHTML = listed.map(corp =>
          `<div class="stock-item" onclick="selectStock('${corp.name}', '${corp.code}', '${corp.market}')">
            <span class="stock-item-name">${corp.name}</span>
            <span class="stock-item-code">${corp.code}</span>
            <span class="stock-item-market">${corp.market}</span>
          </div>`
        ).join('');

        dropdown.classList.add('open');
      } catch(e) {
        dropdown.innerHTML = '<div class="searching-indicator">검색 실패 — 잠시 후 다시 시도해보세요</div>';
      }
    }, 300);
  }

  function selectStock(name, code, market) {
    document.getElementById('a-stock').value = name;
    document.getElementById('a-stock-code').value = code;
    document.getElementById('a-stock-market').value = market;
    document.getElementById('stock-dropdown').classList.remove('open');
    document.getElementById('selected-info').textContent = `${name} (${code}) — ${market}`;
    document.getElementById('stock-selected').style.display = 'block';
    selectedStock = { name, code, market };
  }

  // 드롭다운 외부 클릭 시 닫기
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.stock-wrap')) {
      document.getElementById('stock-dropdown').classList.remove('open');
    }
  });

  window.onload = function() {
    const saved = localStorage.getItem('anthropic_api_key');
    if (saved) {
      document.getElementById('apiKey').value = saved;
      document.getElementById('key-status').style.display = 'block';
      document.getElementById('btn-save').style.display = 'none';
      document.getElementById('btn-clear').style.display = 'inline-block';
    }
  };

  function saveKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key.startsWith('sk-ant-')) { alert('올바른 API 키를 입력해주세요. (sk-ant-로 시작)'); return; }
    localStorage.setItem('anthropic_api_key', key);
    document.getElementById('key-status').style.display = 'block';
    document.getElementById('btn-save').style.display = 'none';
    document.getElementById('btn-clear').style.display = 'inline-block';
  }

  function clearKey() {
    localStorage.removeItem('anthropic_api_key');
    document.getElementById('apiKey').value = '';
    document.getElementById('key-status').style.display = 'none';
    document.getElementById('btn-save').style.display = 'inline-block';
    document.getElementById('btn-clear').style.display = 'none';
  }

  // 탭 전환
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (i===0&&name==='recommend')||(i===1&&name==='analyze'))
    );
    document.getElementById('panel-recommend').classList.toggle('active', name==='recommend');
    document.getElementById('panel-analyze').classList.toggle('active', name==='analyze');
  }

  // 단일 선택 태그
  function solo(el, groupId) {
    document.querySelectorAll(`#${groupId} .tag`).forEach(t => t.classList.remove('on'));
    el.classList.add('on');
  }

  // 복수 선택 태그
  function multi(el) { el.classList.toggle('on'); }

  // 선택된 태그 텍스트 가져오기
  function getSelected(id) {
    return [...document.querySelectorAll(`#${id} .tag.on`)].map(t => t.textContent).join(', ');
  }

  // Claude API 호출 (Worker 프록시 + DART 연동)
  const WORKER_URL = 'https://stock-ai-proxy.dschoi59318.workers.dev';

  async function callClaude(prompt, stockName = '', mode = 'recommend') {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        stockName,
        mode,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API 오류');
    }

    const data = await res.json();
    return {
      text: data.content?.[0]?.text || '응답 없음',
      dartUsed: data.dartUsed || false
    };
  }

  // 종목 추천 실행
  async function runRecommend() {
    const style   = getSelected('style-tags');
    const sector  = getSelected('sector-tags');
    const period  = document.getElementById('r-period').value;
    const market  = document.getElementById('r-market').value;
    const extra   = document.getElementById('r-extra').value;

    const prompt = `다음 조건에 맞는 주식 종목을 3~5개 추천해주세요.
- 투자 성향: ${style}
- 선호 섹터: ${sector || '제한 없음'}
- 투자 기간: ${period}
- 투자 시장: ${market}
${extra ? `- 추가 조건: ${extra}` : ''}
각 종목마다 종목명, 추천 이유, 리스크를 포함하세요.`;

    await run('r', prompt, 'AI가 종목을 분석하고 있습니다...', 'AI 종목 추천 받기');
  }

  // 매수/매도 판단 실행
  async function runAnalyze() {
    const stock  = document.getElementById('a-stock').value.trim();
    const stockCode = document.getElementById('a-stock-code').value.trim();
    if (!stock) { alert('종목명을 입력해주세요.'); return; }

    const view   = getSelected('view-tags');
    const hold   = document.getElementById('a-hold').value;
    const period = document.getElementById('a-period').value;

    const btn   = document.getElementById('btn-a');
    const wrap  = document.getElementById('wrap-a');
    const box   = document.getElementById('box-a');
    const chips = document.getElementById('source-chips-a');
    const newsSection = document.getElementById('news-a');

    btn.disabled = true;
    btn.textContent = '분석 중...';
    wrap.style.display = 'block';
    chips.style.display = 'flex';
    newsSection.style.display = 'none';
    box.className = 'result-box loading';
    box.textContent = `${stock} 뉴스 + 주가 + AI 분석 중... (30초 내외 소요)`;
    ['news','web','ai'].forEach(k => {
      document.getElementById(`chip-${k}-a`).className = 'src-chip active';
    });

    try {
      const prompt = `${stock} 종목을 ${view} 관점으로 분석해주세요.
- 현재 상황: ${hold}
- 투자 기간: ${period}
매수/매도/홀드 판단을 명확히 제시하고 근거를 설명해주세요.`;

      // Worker v2에 한 번에 요청 (Worker가 뉴스+주가+분석 모두 처리)
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          stockName: stock,
          stockCode: stockCode,
          stockMarket: document.getElementById('a-stock-market').value,
          mode: 'analyze',
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!res.ok) throw new Error(`Worker 오류: ${res.status}`);
      const data = await res.json();

      // 뉴스 표시
      const news = data.news || [];
      if (news.length > 0) {
        document.getElementById('news-list-a').innerHTML = news.map(n => `
          <div class="news-item">
            <div class="news-title">${n.title}</div>
            ${n.desc ? `<div class="news-meta">${n.desc}</div>` : ''}
          </div>`).join('');
        newsSection.style.display = 'block';
      }

      // 칩 완료 표시
      ['news','web','ai'].forEach(k => {
        document.getElementById(`chip-${k}-a`).className = 'src-chip done';
      });

      // Worker v2 응답 구조 처리
      let text = '응답 없음';
      if (data.content && Array.isArray(data.content)) {
        text = data.content.filter(c => c.type === 'text').map(c => c.text).join('') || '응답 없음';
      } else if (data.text) {
        text = data.text;
      } else if (data.error) {
        throw new Error(data.error);
      }
      const hasReal = data.hasRealData || (data.news && data.news.length > 0);
      const badge = hasReal
        ? '<div style="font-size:11px;color:var(--green);margin-bottom:8px;font-family:var(--mono);">📊 실시간 뉴스 + 주가 데이터 반영</div>'
        : '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-family:var(--mono);">📚 AI 학습 데이터 기반 분석</div>';

      box.className = 'result-box';
      box.innerHTML = badge + '<pre style="white-space:pre-wrap;font-family:inherit;margin:0;">' + text + '</pre>';

    } catch(e) {
      box.className = 'result-box error';
      box.textContent = '오류: ' + e.message;
    }

    btn.disabled = false;
    btn.textContent = 'AI 매수/매도 판단 받기';
  }

  // 결과 복사
  function copyResult(id) {
    const text = document.getElementById(`box-${id}`).innerText;
    if (!text || text.includes('분석하고 있습니다')) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(`copy-${id}`);
      btn.classList.add('copied');
      btn.querySelector('svg').outerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><polyline points="20 6 9 17 4 12"/></svg>';
      btn.childNodes[btn.childNodes.length - 1].textContent = ' 복사됨!';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 결과 복사`;
      }, 2000);
    });
  }

  // PDF 저장
  function savePDF(id, label) {
    const text = document.getElementById(`box-${id}`).textContent;
    if (!text || text.includes('분석하고 있습니다')) return;

    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    const html = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 주식 분석 - ${label}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #fff; color: #1e293b; padding: 40px; line-height: 1.8; }
  .header { border-bottom: 2px solid #3b82f6; padding-bottom: 16px; margin-bottom: 24px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #1e3a5f; }
  .header .meta { font-size: 12px; color: #64748b; margin-top: 4px; }
  .content { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .footer { margin-top: 32px; padding-top: 12px; border-top: 1px solid #e2e8f0; font-size: 11px; color: #94a3b8; }
  @media print { body { padding: 20px; } }
</style>
</head>
<body>
<div class="header">
  <h1>AI 주식 분석 — ${label}</h1>
  <div class="meta">분석 일시: ${dateStr} ${timeStr} &nbsp;|&nbsp; Powered by Claude AI</div>
</div>
<div class="content">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
<div class="footer">⚠️ 본 분석은 AI가 생성한 정보이며 투자 권유가 아닙니다. 최종 투자 결정은 본인 책임입니다.</div>
<script>window.onload = () => { window.print(); }<\/script>
</body></html>`;

    const blob = new Blob([html], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const win  = window.open(url, '_blank');
    if (!win) alert('팝업이 차단됐어요! 브라우저에서 팝업 허용 후 다시 시도하세요.');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }

  // 공통 실행
  async function run(id, prompt, loadingMsg, btnLabel, stockName='', mode='recommend') {
    const btn  = document.getElementById(`btn-${id}`);
    const wrap = document.getElementById(`wrap-${id}`);
    const box  = document.getElementById(`box-${id}`);

    btn.disabled = true;
    btn.textContent = '분석 중...';
    wrap.style.display = 'block';
    box.className = 'result-box loading';
    box.textContent = loadingMsg;

    try {
      const result = await callClaude(prompt, stockName, mode);
      box.className = 'result-box';
      const text = typeof result === 'object' ? result.text : result;
      const dartUsed = typeof result === 'object' ? result.dartUsed : false;
      const badge = dartUsed
        ? '<div style="font-size:11px;color:#10b981;margin-bottom:8px;font-family:monospace;">📊 DART 실시간 공시 데이터 반영</div>'
        : (mode === 'analyze' ? '<div style="font-size:11px;color:#64748b;margin-bottom:8px;font-family:monospace;">📚 AI 학습 데이터 기반 분석</div>' : '');
      box.innerHTML = badge + '<pre style="white-space:pre-wrap;font-family:inherit;margin:0;">' + text + '</pre>';
    } catch(e) {
      box.className = 'result-box error';
      box.textContent = '오류: ' + e.message;
    }

    btn.disabled = false;
    btn.textContent = btnLabel;
  }
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('SW registered'))
        .catch(() => console.log('SW registration failed'));
    });
  }
</script>
</body>
</html>
